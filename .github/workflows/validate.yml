name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      
      - name: Install dependencies
        run: uv sync --no-install-project
      
      - name: Check Python syntax
        run: |
          python -m py_compile src/train.py
          python -m py_compile src/core/base_model.py
          python -m py_compile src/core/base_data.py
          for f in src/experiments/*/model.py; do
            python -m py_compile "$f"
          done
      
      - name: Validate experiments
        run: |
          for exp in src/experiments/*/; do
            exp_id=$(basename "$exp")
            if [ "$exp_id" != "__pycache__" ]; then
              uv run python scripts/validate.py "$exp_id"
            fi
          done

      - name: Validate agent state
        run: uv run python scripts/validate_state.py

      - name: Lint Agent Docs
        run: uv run python scripts/lint_agent_docs.py
      
      - name: Check literature citations
        run: uv run python scripts/lit_index.py --check
