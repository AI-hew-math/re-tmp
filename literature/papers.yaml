# Paper Database
# Format: key → metadata
# Cite in experiments as [@key]
#
# Fields:
#   title, authors, year, venue     - Basic metadata
#   arxiv, url                      - Links (arxiv ID or full URL)
#   repo                            - Official code repository
#   tags                            - Categories for filtering
#   notes                           - One-line summary
#   details                         - Path to detailed notes (literature/papers/<key>.md)
#
# For important papers, create literature/papers/<key>.md with:
#   - Key contributions
#   - Architecture/method details
#   - Code snippets worth borrowing
#   - How it relates to our work

# =============================================================================
# Core Methods
# =============================================================================

resnet:
  title: "Deep Residual Learning for Image Recognition"
  authors: "He et al."
  year: 2016
  venue: CVPR
  arxiv: "1512.03385"
  repo: "https://github.com/KaimingHe/deep-residual-networks"
  tags: [architecture, vision, baseline]
  notes: "Skip connections, foundation for modern CNNs"
